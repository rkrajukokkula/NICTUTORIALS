<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<title>Tutorial Student Activity Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --green:#1b8a5a; --green-dark:#136b45; --blue:#1565c0; --blue-dark:#0d47a1;
    --bg:#f2f6f4; --card:#ffffff; --text:#1f2a24; --muted:#6b7a72; --border:#e1e8e4;
    --danger:#d0422a; --warn:#e0a51e; --radius:12px;
  }
  [data-theme="dark"]{
    --bg:#101613; --card:#182019; --text:#e7efe9; --muted:#9db0a6; --border:#2a352e;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
  a{color:inherit;}
  .hidden{display:none !important;}
  /* ---------- Login ---------- */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--green),var(--blue));}
  .login-card{background:var(--card);width:360px;max-width:92vw;border-radius:var(--radius);
    padding:28px;box-shadow:0 10px 40px rgba(0,0,0,.25);}
  .login-card h1{font-size:20px;margin:0 0 4px;text-align:center;}
  .login-card p.sub{text-align:center;color:var(--muted);margin:0 0 18px;font-size:13px;}
  .role-tabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:16px;}
  .role-tabs button{flex:1;border:none;background:transparent;padding:8px;border-radius:6px;cursor:pointer;font-weight:600;color:var(--muted);}
  .role-tabs button.active{background:var(--green);color:#fff;}
  input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;
    margin-bottom:12px;background:var(--card);color:var(--text);font-size:14px;}
  label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
  .btn{border:none;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:14px;}
  .btn-primary{background:var(--green);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--green-dark);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dark);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:12px;}
  #loginMsg{color:var(--danger);font-size:13px;text-align:center;margin-top:6px;}
  /* ---------- App shell ---------- */
  #appScreen{min-height:100vh;}
  header.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(90deg,var(--green),var(--blue));
    color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  header.topbar .brand{font-weight:700;font-size:16px;}
  header.topbar .userinfo{font-size:13px;opacity:.9;}
  nav.tabs{display:flex;gap:4px;background:var(--card);padding:6px 10px;overflow-x:auto;border-bottom:1px solid var(--border);
    position:sticky;top:48px;z-index:19;}
  nav.tabs button{white-space:nowrap;background:transparent;border:none;padding:9px 14px;border-radius:8px;
    cursor:pointer;font-weight:600;color:var(--muted);font-size:13px;}
  nav.tabs button.active{background:var(--green);color:#fff;}
  main{padding:16px;max-width:1200px;margin:0 auto;}
  .grid{display:grid;gap:14px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;}}
  @media(max-width:520px){.grid-4{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .stat-card .num{font-size:26px;font-weight:700;}
  .stat-card .lbl{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .section-title{font-size:15px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;justify-content:space-between;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;}
  tr:hover td{background:rgba(27,138,90,.05);}
  .table-wrap{overflow-x:auto;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .toolbar input,.toolbar select{width:auto;margin-bottom:0;min-width:140px;}
  .badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-green{background:#d9f2e4;color:var(--green-dark);}
  .badge-red{background:#fbdedb;color:var(--danger);}
  .badge-yellow{background:#fdf0d0;color:#8a6111;}
  [data-theme="dark"] .badge-green{background:#12351f;}
  [data-theme="dark"] .badge-red{background:#3a1712;}
  [data-theme="dark"] .badge-yellow{background:#3a2c0d;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px;}
  .modal{background:var(--card);border-radius:var(--radius);padding:20px;width:520px;max-width:100%;max-height:90vh;overflow:auto;}
  .modal h3{margin-top:0;}
  .checklist{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 12px;margin-bottom:12px;}
  .checklist label{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--text);font-weight:400;}
  .checklist input{width:auto;margin:0;}
  .close-x{float:right;cursor:pointer;font-size:20px;color:var(--muted);}
  .footer-note{text-align:center;color:var(--muted);font-size:12px;padding:20px;}
  .toggle-theme{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:520px){.form-row{grid-template-columns:1fr;}}
  .parent-wrap{max-width:820px;margin:0 auto;padding:16px;}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:13px;}
  .link-box{display:flex;gap:6px;align-items:center;background:var(--bg);padding:8px;border-radius:8px;font-size:12px;word-break:break-all;}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <h1>📚 Tutorial Student Activity System</h1>
    <p class="sub">Sign in to continue</p>
    <div class="role-tabs">
      <button id="tabAdmin" class="active" onclick="setLoginRole('admin')">Admin</button>
      <button id="tabTeacher" onclick="setLoginRole('teacher')">Teacher</button>
    </div>
    <label>Username</label>
    <input id="loginUser" placeholder="Username">
    <label>Password</label>
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <div id="loginMsg"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appScreen" class="hidden">
  <header class="topbar">
    <div class="brand">📚 <span id="instituteNameLbl">Tutorial Institute</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="userinfo" id="userInfoLbl"></span>
      <button class="toggle-theme" onclick="toggleTheme()">🌓</button>
      <button class="toggle-theme" onclick="logout()">Logout</button>
    </div>
  </header>
  <nav class="tabs" id="navTabs"></nav>
  <main id="mainContent"></main>
  <div class="footer-note">Tutorial Student Activity Management System</div>
</div>

<!-- ================= PARENT PORTAL (standalone) ================= -->
<div id="parentScreen" class="hidden">
  <header class="topbar">
    <div class="brand">📚 Parent Portal</div>
    <button class="toggle-theme" onclick="toggleTheme()">🌓</button>
  </header>
  <div class="parent-wrap" id="parentContent"></div>
</div>

<div id="modalRoot"></div>

<script>
/* ===================== GLOBAL STATE ===================== */
var STATE = {
  role: null, name: null, teacherId: null, classes: [], batches: [],
  studentsCache: [], teachersCache: []
};
var INITIAL_STUDENT_ID = <?= JSON.stringify(initialStudentId || '') ?>;

/* ===================== UTIL: promise wrapper ===================== */
function gs(fn){
  return function(){
    var args = Array.prototype.slice.call(arguments);
    return new Promise(function(resolve, reject){
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function(err){ reject(err); })[fn].apply(null, args);
    });
  };
}
var api = {
  loginAdmin: gs('loginAdmin'),
  loginTeacher: gs('loginTeacher'),
  getStudents: gs('getStudents'),
  saveStudent: gs('saveStudent'),
  deleteStudent: gs('deleteStudent'),
  getTeachers: gs('getTeachers'),
  saveTeacher: gs('saveTeacher'),
  deleteTeacher: gs('deleteTeacher'),
  getClassesAndBatches: gs('getClassesAndBatches'),
  saveDailyEntry: gs('saveDailyEntry'),
  getEntriesForStudent: gs('getEntriesForStudent'),
  getEntriesForTeacherDate: gs('getEntriesForTeacherDate'),
  getStudentProfile: gs('getStudentProfile'),
  getDashboardData: gs('getDashboardData'),
  getReportData: gs('getReportData')
};

/* ===================== INIT ===================== */
window.addEventListener('DOMContentLoaded', function(){
  if (localStorage.getItem('tsams_theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');
  if (INITIAL_STUDENT_ID) { loadParentPortal(INITIAL_STUDENT_ID); return; }
  var saved = sessionStorage.getItem('tsams_session');
  if (saved) {
    STATE = JSON.parse(saved);
    enterApp();
  }
});

function toggleTheme(){
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('tsams_theme','light'); }
  else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('tsams_theme','dark'); }
}

/* ===================== LOGIN ===================== */
var loginRole = 'admin';
function setLoginRole(r){
  loginRole = r;
  document.getElementById('tabAdmin').classList.toggle('active', r==='admin');
  document.getElementById('tabTeacher').classList.toggle('active', r==='teacher');
}
function doLogin(){
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var msg = document.getElementById('loginMsg');
  msg.textContent = '';
  if (!u || !p) { msg.textContent = 'Enter username and password'; return; }
  var call = loginRole === 'admin' ? api.loginAdmin(u,p) : api.loginTeacher(u,p);
  call.then(function(res){
    if (!res.success) { msg.textContent = res.message || 'Login failed'; return; }
    STATE.role = res.role; STATE.name = res.name;
    STATE.teacherId = res.teacherId || null;
    sessionStorage.setItem('tsams_session', JSON.stringify(STATE));
    enterApp();
  }).catch(function(e){ msg.textContent = 'Error: ' + e; });
}
function logout(){
  sessionStorage.removeItem('tsams_session');
  location.href = location.href.split('?')[0];
}

/* ===================== APP SHELL ===================== */
function enterApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userInfoLbl').textContent = STATE.name + ' (' + STATE.role + ')';
  api.getClassesAndBatches().then(function(cfg){
    STATE.classes = cfg.classes; STATE.batches = cfg.batches;
    document.getElementById('instituteNameLbl').textContent = cfg.instituteName;
    buildNav();
  });
}

function buildNav(){
  var tabs = STATE.role === 'admin'
    ? [['dashboard','Dashboard'],['students','Students'],['teachers','Teachers'],['reports','Reports']]
    : [['dashboard','Dashboard'],['entry','Daily Entry'],['reports','My Reports']];
  var nav = document.getElementById('navTabs');
  nav.innerHTML = tabs.map(function(t,i){
    return '<button data-tab="'+t[0]+'" onclick="goTab(\''+t[0]+'\')" class="'+(i===0?'active':'')+'">'+t[1]+'</button>';
  }).join('');
  goTab(tabs[0][0]);
}
function goTab(tab){
  document.querySelectorAll('#navTabs button').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
  var m = { dashboard: renderDashboard, students: renderStudents, teachers: renderTeachers, entry: renderEntry, reports: renderReports };
  (m[tab] || renderDashboard)();
}

/* ===================== DASHBOARD ===================== */
function renderDashboard(){
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div class="empty">Loading dashboard…</div>';
  api.getDashboardData().then(function(d){
    var html = '';
    html += '<div class="grid grid-4">';
    html += statCard(d.totalStudents, 'Active Students');
    html += statCard(d.present, 'Present Today', 'green');
    html += statCard(d.absent, 'Absent Today', 'red');
    html += statCard(d.pendingHomework, 'Pending Homework', 'yellow');
    html += '</div>';

    html += '<div class="section-title">📅 ' + d.today + '</div>';
    html += '<div class="grid grid-2">';

    html += '<div class="card"><b>🎂 Upcoming Birthdays (7 days)</b><div class="table-wrap">';
    html += d.birthdays.length ? tableize(d.birthdays, ['name','class','dob'], ['Name','Class','DOB']) : '<div class="empty">None</div>';
    html += '</div></div>';

    html += '<div class="card"><b>⚠️ Low Attendance (&lt;75%)</b><div class="table-wrap">';
    html += d.lowAttendance.length ? tableize(d.lowAttendance, ['name','pct'], ['Name','Attendance %']) : '<div class="empty">None</div>';
    html += '</div></div>';

    html += '</div>';

    html += '<div class="card" style="margin-top:14px;"><b>🕒 Recent Activities</b><div class="table-wrap">';
    html += d.recentActivities.length ? tableize(d.recentActivities, ['date','student','activities','note'], ['Date','Student','Activities','Note']) : '<div class="empty">No recent activity</div>';
    html += '</div></div>';

    main.innerHTML = html;
  });
}
function statCard(num,lbl,color){
  return '<div class="card stat-card"><div class="num">'+num+'</div><div class="lbl">'+lbl+'</div></div>';
}
function tableize(rows, keys, labels){
  var html = '<table><thead><tr>' + labels.map(function(l){return '<th>'+l+'</th>';}).join('') + '</tr></thead><tbody>';
  rows.forEach(function(r){
    html += '<tr>' + keys.map(function(k){ return '<td>'+ (r[k]===undefined?'':r[k]) +'</td>'; }).join('') + '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

/* ===================== STUDENTS (admin) ===================== */
function renderStudents(){
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div class="empty">Loading students…</div>';
  api.getStudents().then(function(list){
    STATE.studentsCache = list;
    drawStudentsTable(list);
  });
}
function drawStudentsTable(list){
  var main = document.getElementById('mainContent');
  var html = '<div class="toolbar">'
    + '<input id="stuSearch" placeholder="Search name / ID / class" oninput="filterStudents()">'
    + '<button class="btn btn-primary" style="width:auto;" onclick="openStudentModal()">+ Add Student</button>'
    + '<button class="btn btn-outline" onclick="exportCSV(STATE.studentsCache, \'students\')">Export CSV</button>'
    + '</div>';
  html += '<div class="table-wrap card"><table id="stuTable"><thead><tr>'
    + '<th>ID</th><th>Name</th><th>Class</th><th>Batch</th><th>Mobile</th><th>Status</th><th>Parent Link</th><th>Actions</th></tr></thead><tbody>';
  list.forEach(function(s){
    html += '<tr>'
      + '<td>'+s.StudentID+'</td><td>'+s.Name+'</td><td>'+s.Class+'</td><td>'+s.Batch+'</td>'
      + '<td>'+s.Mobile+'</td>'
      + '<td><span class="badge '+(s.Status==='Active'?'badge-green':s.Status==='Left'?'badge-red':'badge-yellow')+'">'+s.Status+'</span></td>'
      + '<td><div class="link-box"><span style="flex:1;">'+s.ParentLink+'</span><button class="btn btn-sm btn-outline" onclick="copyText(\''+s.ParentLink+'\')">Copy</button></div></td>'
      + '<td><button class="btn btn-sm btn-blue" onclick="openStudentModal(\''+s.StudentID+'\')">Edit</button> '
      + '<button class="btn btn-sm btn-danger" onclick="removeStudent(\''+s.StudentID+'\')">Del</button></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  main.innerHTML = html;
}
function filterStudents(){
  var q = document.getElementById('stuSearch').value.toLowerCase();
  var filtered = STATE.studentsCache.filter(function(s){
    return (s.Name+s.StudentID+s.Class).toLowerCase().indexOf(q) > -1;
  });
  drawStudentsTable(filtered);
  document.getElementById('stuSearch').value = q;
  document.getElementById('stuSearch').focus();
}
function copyText(t){ navigator.clipboard.writeText(t); alert('Link copied!'); }
function removeStudent(id){
  if (!confirm('Delete this student?')) return;
  api.deleteStudent(id).then(function(){ renderStudents(); });
}
function openStudentModal(id){
  var s = id ? STATE.studentsCache.find(function(x){return x.StudentID===id;}) : {};
  var classOpts = STATE.classes.map(function(c){return '<option '+(s.Class===c?'selected':'')+'>'+c+'</option>';}).join('');
  var batchOpts = STATE.batches.map(function(b){return '<option '+(s.Batch===b?'selected':'')+'>'+b+'</option>';}).join('');
  var html = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    + '<span class="close-x" onclick="closeModal()">&times;</span>'
    + '<h3>'+(id?'Edit':'Add')+' Student</h3>'
    + '<div class="form-row"><div><label>Name</label><input id="f_Name" value="'+(s.Name||'')+'"></div>'
    + '<div><label>Admission No.</label><input id="f_AdmissionNumber" value="'+(s.AdmissionNumber||'')+'"></div></div>'
    + '<div class="form-row"><div><label>Father Name</label><input id="f_FatherName" value="'+(s.FatherName||'')+'"></div>'
    + '<div><label>Mother Name</label><input id="f_MotherName" value="'+(s.MotherName||'')+'"></div></div>'
    + '<div class="form-row"><div><label>Mobile</label><input id="f_Mobile" value="'+(s.Mobile||'')+'"></div>'
    + '<div><label>Alt. Mobile</label><input id="f_AltMobile" value="'+(s.AltMobile||'')+'"></div></div>'
    + '<div class="form-row"><div><label>Class</label><select id="f_Class">'+classOpts+'</select></div>'
    + '<div><label>Batch</label><select id="f_Batch">'+batchOpts+'</select></div></div>'
    + '<div class="form-row"><div><label>School</label><input id="f_School" value="'+(s.School||'')+'"></div>'
    + '<div><label>Date of Birth</label><input id="f_DOB" type="date" value="'+(s.DOB?formatDateInput(s.DOB):'')+'"></div></div>'
    + '<div class="form-row"><div><label>Joining Date</label><input id="f_JoiningDate" type="date" value="'+(s.JoiningDate?formatDateInput(s.JoiningDate):'')+'"></div>'
    + '<div><label>Status</label><select id="f_Status"><option '+(s.Status==='Active'?'selected':'')+'>Active</option><option '+(s.Status==='Inactive'?'selected':'')+'>Inactive</option><option '+(s.Status==='Left'?'selected':'')+'>Left</option></select></div></div>'
    + '<label>Address</label><textarea id="f_Address">'+(s.Address||'')+'</textarea>'
    + '<label>Remarks</label><textarea id="f_Remarks">'+(s.Remarks||'')+'</textarea>'
    + '<button class="btn btn-primary" onclick="submitStudent(\''+(id||'')+'\')">Save Student</button>'
    + '</div></div>';
  document.getElementById('modalRoot').innerHTML = html;
}
function formatDateInput(v){
  var d = new Date(v);
  if (isNaN(d)) return '';
  return d.toISOString().substring(0,10);
}
function submitStudent(id){
  var data = {
    StudentID: id || '', Name: val('f_Name'), AdmissionNumber: val('f_AdmissionNumber'),
    FatherName: val('f_FatherName'), MotherName: val('f_MotherName'), Mobile: val('f_Mobile'),
    AltMobile: val('f_AltMobile'), Class: val('f_Class'), Batch: val('f_Batch'), School: val('f_School'),
    DOB: val('f_DOB'), JoiningDate: val('f_JoiningDate'), Status: val('f_Status'),
    Address: val('f_Address'), Remarks: val('f_Remarks')
  };
  if (!data.Name){ alert('Name is required'); return; }
  api.saveStudent(data).then(function(){ closeModal(); renderStudents(); });
}
function val(id){ return document.getElementById(id).value; }
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

/* ===================== TEACHERS (admin) ===================== */
function renderTeachers(){
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div class="empty">Loading teachers…</div>';
  api.getTeachers().then(function(list){
    STATE.teachersCache = list;
    var html = '<div class="toolbar"><button class="btn btn-primary" style="width:auto;" onclick="openTeacherModal()">+ Add Teacher</button></div>';
    html += '<div class="table-wrap card"><table><thead><tr><th>ID</th><th>Name</th><th>Username</th><th>Mobile</th><th>Subjects</th><th>Classes</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    list.forEach(function(t){
      html += '<tr><td>'+t.TeacherID+'</td><td>'+t.Name+'</td><td>'+t.Username+'</td><td>'+t.Mobile+'</td><td>'+t.Subjects+'</td><td>'+t.Classes+'</td>'
        + '<td><span class="badge '+(t.Status==='Active'?'badge-green':'badge-red')+'">'+t.Status+'</span></td>'
        + '<td><button class="btn btn-sm btn-blue" onclick="openTeacherModal(\''+t.TeacherID+'\')">Edit</button> '
        + '<button class="btn btn-sm btn-danger" onclick="removeTeacher(\''+t.TeacherID+'\')">Del</button></td></tr>';
    });
    html += '</tbody></table></div>';
    main.innerHTML = html;
  });
}
function removeTeacher(id){
  if (!confirm('Delete this teacher?')) return;
  api.deleteTeacher(id).then(function(){ renderTeachers(); });
}
function openTeacherModal(id){
  var t = id ? STATE.teachersCache.find(function(x){return x.TeacherID===id;}) : {};
  var html = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    + '<span class="close-x" onclick="closeModal()">&times;</span><h3>'+(id?'Edit':'Add')+' Teacher</h3>'
    + '<label>Name</label><input id="t_Name" value="'+(t.Name||'')+'">'
    + '<div class="form-row"><div><label>Username</label><input id="t_Username" value="'+(t.Username||'')+'"></div>'
    + '<div><label>Password</label><input id="t_Password" value="'+(t.Password||'')+'"></div></div>'
    + '<label>Mobile</label><input id="t_Mobile" value="'+(t.Mobile||'')+'">'
    + '<label>Subjects (comma separated)</label><input id="t_Subjects" value="'+(t.Subjects||'')+'">'
    + '<label>Classes (comma separated)</label><input id="t_Classes" value="'+(t.Classes||'')+'">'
    + '<label>Status</label><select id="t_Status"><option '+(t.Status==='Active'?'selected':'')+'>Active</option><option '+(t.Status==='Inactive'?'selected':'')+'>Inactive</option></select>'
    + '<button class="btn btn-primary" onclick="submitTeacher(\''+(id||'')+'\')">Save Teacher</button>'
    + '</div></div>';
  document.getElementById('modalRoot').innerHTML = html;
}
function submitTeacher(id){
  var data = { TeacherID:id||'', Name:val('t_Name'), Username:val('t_Username'), Password:val('t_Password'),
    Mobile:val('t_Mobile'), Subjects:val('t_Subjects'), Classes:val('t_Classes'), Status:val('t_Status') };
  if (!data.Name || !data.Username || !data.Password){ alert('Name, Username and Password are required'); return; }
  api.saveTeacher(data).then(function(){ closeModal(); renderTeachers(); });
}

/* ===================== DAILY ENTRY (teacher) ===================== */
var ACTIVITY_OPTIONS = ['Homework Done','Reading','Silent Reading','Writing Practice','Worksheets','Practice Questions',
  'Doubt Clarification','Revision','Speaking Practice','Memorization','Handwriting','Project Work','Lab Activity',
  'Computer Practice','Group Discussion','Oral Test','Assignment','Exam Preparation'];

function renderEntry(){
  var main = document.getElementById('mainContent');
  var today = new Date().toISOString().substring(0,10);
  api.getStudents().then(function(list){
    STATE.studentsCache = list.filter(function(s){ return s.Status==='Active'; });
    var classOpts = ['<option value="">All Classes</option>'].concat(STATE.classes.map(function(c){return '<option>'+c+'</option>';})).join('');
    var html = '<div class="card">'
      + '<div class="form-row">'
      + '<div><label>Date</label><input type="date" id="e_Date" value="'+today+'" onchange="onEntryFiltersChange()"></div>'
      + '<div><label>Class</label><select id="e_Class" onchange="onEntryFiltersChange()">'+classOpts+'</select></div>'
      + '</div>'
      + '<label>Student</label><select id="e_Student" onchange="loadStudentEntry()"></select>'
      + '<div id="entryFormArea"></div>'
      + '</div>';
    main.innerHTML = html;
    populateStudentDropdown();
  });
}
function onEntryFiltersChange(){ populateStudentDropdown(); }
function populateStudentDropdown(){
  var cls = document.getElementById('e_Class').value;
  var filtered = STATE.studentsCache.filter(function(s){ return !cls || s.Class===cls; });
  var sel = document.getElementById('e_Student');
  sel.innerHTML = '<option value="">-- Select Student --</option>' + filtered.map(function(s){
    return '<option value="'+s.StudentID+'">'+s.Name+' ('+s.StudentID+')</option>';
  }).join('');
  document.getElementById('entryFormArea').innerHTML = '';
}
function loadStudentEntry(){
  var sid = document.getElementById('e_Student').value;
  var area = document.getElementById('entryFormArea');
  if (!sid) { area.innerHTML = ''; return; }
  var date = document.getElementById('e_Date').value;
  var student = STATE.studentsCache.find(function(s){return s.StudentID===sid;});
  api.getEntriesForTeacherDate(STATE.teacherId, date).then(function(entries){
    var existing = entries.find(function(e){ return e.StudentID===sid; }) || {};
    var activities = existing.Activities ? existing.Activities.split(',').map(function(s){return s.trim();}) : [];
    var checklistHtml = ACTIVITY_OPTIONS.map(function(a){
      return '<label><input type="checkbox" value="'+a+'" '+(activities.indexOf(a)>-1?'checked':'')+'> '+a+'</label>';
    }).join('');
    area.innerHTML =
      '<div class="section-title">Attendance</div>'
      + '<div class="form-row">'
      + '<div><label>Status</label><select id="en_Attendance">'
      +   ['Present','Absent','Late','Leave'].map(function(o){return '<option '+(existing.Attendance===o?'selected':'')+'>'+o+'</option>';}).join('')
      + '</select></div>'
      + '<div><label>Study Minutes (total)</label><input id="en_StudyMinutes" type="number" value="'+(existing.StudyMinutes||'')+'"></div>'
      + '</div>'
      + '<div class="form-row">'
      + '<div><label>Arrival Time</label><input id="en_ArrivalTime" type="time" value="'+(existing.ArrivalTime||'')+'"></div>'
      + '<div><label>Leaving Time</label><input id="en_LeavingTime" type="time" value="'+(existing.LeavingTime||'')+'"></div>'
      + '</div>'
      + '<div class="section-title">Activity Checklist</div>'
      + '<div class="checklist">'+checklistHtml+'</div>'
      + '<label>Other Activity (description)</label><input id="en_OtherActivity" value="'+(existing.OtherActivity||'')+'">'

      + '<div class="section-title">Homework</div>'
      + '<div class="form-row">'
      + '<div><label>Subject</label><input id="en_HomeworkSubject" value="'+(existing.HomeworkSubject||'')+'"></div>'
      + '<div><label>Status</label><select id="en_HomeworkStatus">'
      +   ['','Done','Pending','Partial'].map(function(o){return '<option '+(existing.HomeworkStatus===o?'selected':'')+'>'+o+'</option>';}).join('')
      + '</select></div></div>'
      + '<label>Homework Rating</label><select id="en_HomeworkRating">'
      +   ['','Excellent','Good','Average','Poor'].map(function(o){return '<option '+(existing.HomeworkRating===o?'selected':'')+'>'+o+'</option>';}).join('')
      + '</select>'

      + '<div class="section-title">Test / Exam</div>'
      + '<div class="form-row">'
      + '<div><label>Test Type</label><select id="en_TestType">'
      +   ['','Class Test','Slip Test','Weekly Test','Monthly Test','Unit Test','Model Exam','Final Exam'].map(function(o){return '<option '+(existing.TestType===o?'selected':'')+'>'+o+'</option>';}).join('')
      + '</select></div>'
      + '<div><label>Subject</label><input id="en_TestSubject" value="'+(existing.TestSubject||'')+'"></div></div>'
      + '<div class="form-row">'
      + '<div><label>Max Marks</label><input id="en_MaxMarks" type="number" value="'+(existing.MaxMarks||'')+'"></div>'
      + '<div><label>Obtained Marks</label><input id="en_ObtainedMarks" type="number" value="'+(existing.ObtainedMarks||'')+'"></div></div>'

      + '<div class="section-title">Behaviour & Remarks</div>'
      + '<label>Behaviour</label><select id="en_Behaviour">'
      +   ['','Excellent','Good','Average','Needs Improvement'].map(function(o){return '<option '+(existing.Behaviour===o?'selected':'')+'>'+o+'</option>';}).join('')
      + '</select>'
      + '<label>Teacher Observation</label><textarea id="en_Observation">'+(existing.Observation||'')+'</textarea>'
      + '<label>Parent Remark (optional)</label><textarea id="en_ParentRemark">'+(existing.ParentRemark||'')+'</textarea>'
      + '<button class="btn btn-primary" onclick="submitEntry(\''+sid+'\',\''+student.Name+'\',\''+student.Class+'\')">Save Entry</button>'
      + '<div id="entrySavedMsg"></div>';
  });
}
function submitEntry(sid, sname, sclass){
  var checked = Array.prototype.slice.call(document.querySelectorAll('.checklist input:checked')).map(function(c){return c.value;});
  var data = {
    Date: document.getElementById('e_Date').value, StudentID: sid, StudentName: sname, Class: sclass,
    Attendance: val('en_Attendance'), ArrivalTime: val('en_ArrivalTime'), LeavingTime: val('en_LeavingTime'),
    Activities: checked, OtherActivity: val('en_OtherActivity'), StudyMinutes: val('en_StudyMinutes'),
    HomeworkSubject: val('en_HomeworkSubject'), HomeworkStatus: val('en_HomeworkStatus'), HomeworkRating: val('en_HomeworkRating'),
    TestType: val('en_TestType'), TestSubject: val('en_TestSubject'), MaxMarks: val('en_MaxMarks'), ObtainedMarks: val('en_ObtainedMarks'),
    Behaviour: val('en_Behaviour'), Observation: val('en_Observation'), ParentRemark: val('en_ParentRemark')
  };
  api.saveDailyEntry(data, STATE.teacherId, STATE.name).then(function(res){
    var m = document.getElementById('entrySavedMsg');
    m.textContent = res.success ? '✅ Saved successfully' : ('❌ ' + res.message);
    m.style.color = res.success ? 'var(--green)' : 'var(--danger)';
  });
}

/* ===================== REPORTS ===================== */
function renderReports(){
  var main = document.getElementById('mainContent');
  Promise.all([api.getStudents(), STATE.role==='admin'?api.getTeachers():Promise.resolve([])]).then(function(res){
    var students = res[0];
    var studentOpts = ['<option value="">All Students</option>'].concat(students.map(function(s){return '<option value="'+s.StudentID+'">'+s.Name+'</option>';})).join('');
    var classOpts = ['<option value="">All Classes</option>'].concat(STATE.classes.map(function(c){return '<option>'+c+'</option>';})).join('');
    var html = '<div class="card"><div class="toolbar">'
      + '<select id="r_Student">'+studentOpts+'</select>'
      + '<select id="r_Class">'+classOpts+'</select>'
      + '<input type="date" id="r_From"> <input type="date" id="r_To">'
      + '<button class="btn btn-primary" style="width:auto;" onclick="runReport()">Filter</button>'
      + '<button class="btn btn-outline" onclick="exportCSV(window.lastReport||[], \'report\')">Export CSV</button>'
      + '</div><div id="reportArea"></div></div>';
    main.innerHTML = html;
    runReport();
  });
}
function runReport(){
  var filters = {
    studentId: val('r_Student'), className: val('r_Class'), from: val('r_From'), to: val('r_To')
  };
  if (STATE.role === 'teacher') filters.teacherId = STATE.teacherId;
  api.getReportData(filters).then(function(rows){
    window.lastReport = rows;
    var area = document.getElementById('reportArea');
    if (!rows.length) { area.innerHTML = '<div class="empty">No records found</div>'; return; }
    area.innerHTML = '<div class="table-wrap">' + tableize(rows,
      ['Date','StudentName','Class','TeacherName','Attendance','HomeworkStatus','TestSubject','ObtainedMarks','MaxMarks','Percentage','Grade','PassFail','Observation'],
      ['Date','Student','Class','Teacher','Attendance','Homework','Test Subj','Marks','Max','%','Grade','Result','Observation']
    ) + '</div>';
  });
}
function exportCSV(rows, name){
  if (!rows || !rows.length) { alert('No data to export'); return; }
  var keys = Object.keys(rows[0]).filter(function(k){return k!=='_row';});
  var csv = keys.join(',') + '\n' + rows.map(function(r){
    return keys.map(function(k){ return '"'+String(r[k]||'').replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = name + '_' + new Date().toISOString().substring(0,10) + '.csv';
  link.click();
}

/* ===================== PARENT PORTAL ===================== */
function loadParentPortal(studentId){
  document.getElementById('parentScreen').classList.remove('hidden');
  var content = document.getElementById('parentContent');
  content.innerHTML = '<div class="empty">Loading student profile…</div>';
  api.getStudentProfile(studentId).then(function(res){
    if (!res.success) { content.innerHTML = '<div class="empty">'+res.message+'</div>'; return; }
    var s = res.student, entries = res.entries;
    var totalDays = entries.filter(function(e){return e.Attendance;}).length;
    var presentDays = entries.filter(function(e){return e.Attendance==='Present';}).length;
    var attPct = totalDays ? Math.round((presentDays/totalDays)*100) : 0;
    var testsWithMarks = entries.filter(function(e){return e.Percentage!=='' && e.Percentage!==undefined;});
    var avgPct = testsWithMarks.length ? Math.round(testsWithMarks.reduce(function(a,e){return a+parseFloat(e.Percentage);},0)/testsWithMarks.length) : 0;

    var html = '<div class="card"><h2 style="margin:0;">'+s.Name+'</h2>'
      + '<div style="color:var(--muted);font-size:13px;">Class '+s.Class+' • Batch '+s.Batch+' • '+s.School+'</div></div>';

    html += '<div class="grid grid-3" style="margin-top:14px;">';
    html += statCard(attPct+'%','Attendance');
    html += statCard(avgPct+'%','Average Test Score');
    html += statCard(entries.length,'Total Records');
    html += '</div>';

    html += '<div class="card" style="margin-top:14px;"><b>📈 Test Performance</b><canvas id="testChart" height="120"></canvas></div>';

    html += '<div class="card" style="margin-top:14px;"><b>🗓️ Recent Records</b><div class="table-wrap">';
    html += entries.length ? tableize(entries.slice(0,20),
      ['Date','Attendance','Activities','HomeworkStatus','TestSubject','ObtainedMarks','MaxMarks','Grade','Observation'],
      ['Date','Attendance','Activities','Homework','Test','Marks','Max','Grade','Teacher Note']
    ) : '<div class="empty">No records yet</div>';
    html += '</div></div>';

    content.innerHTML = html;

    if (window.Chart && testsWithMarks.length) {
      var ctx = document.getElementById('testChart');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: testsWithMarks.slice().reverse().map(function(e){return e.Date instanceof Date? e.Date.toString().substring(0,10): String(e.Date).substring(0,10);}),
          datasets: [{ label: 'Score %', data: testsWithMarks.slice().reverse().map(function(e){return e.Percentage;}), borderColor:'#1b8a5a', backgroundColor:'rgba(27,138,90,.15)', fill:true, tension:.3 }]
        },
        options: { plugins:{legend:{display:false}}, scales:{ y:{ min:0, max:100 } } }
      });
    }
  });
}
